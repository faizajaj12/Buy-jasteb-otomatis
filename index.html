<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fizmarket JASTEB</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

#loading {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    color: yellow;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
}

.container {
    display: none;
    padding: 20px;
}

h1 {
    text-align: center;
    color: yellow;
}

#jam {
    text-align: center;
    margin-bottom: 20px;
}

/* PRODUK GRID */
.produk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid yellow;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: #1a1a1a;
}

.card h3 {
    color: yellow;
    margin-top: 0;
}

.price {
    font-size: 14px;
    margin: 5px 0;
}

.box {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
}

button {
    background: yellow;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

#qris {
    display: none;
    text-align: center;
}

#qris img {
    width: 220px;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="loading">Loading Fizmarket...</div>

<div class="container" id="main">

<h1>FIZMARKET - JASTEB</h1>
<div id="jam"></div>

<!-- PRODUK RAPI -->
<div class="produk-grid">

<div class="card">
<h3>JASTEB BIASA</h3>
<div class="price">Rp 3.000 • 40 resh</div>
<div class="price">Rp 5.000 • 85 resh</div>
<div class="price">Rp 10.000 • 130 resh</div>
<div class="price">Rp 15.000 • 250 resh</div>
</div>

<div class="card">
<h3>JASTEB VIP</h3>
<div class="price">Rp 10.000 • 50 resh</div>
<div class="price">Rp 20.000 • 100 resh</div>
<div class="price">Rp 30.000 • 190 resh</div>
</div>

</div>

<!-- FORM -->
<div class="box">
<h3>Order Sekarang</h3>

<input type="text" value="JASTEB" readonly>

<select id="produk">
<option value="">Pilih Produk</option>
<option>JASTEB BIASA - Rp 3.000</option>
<option>JASTEB BIASA - Rp 5.000</option>
<option>JASTEB BIASA - Rp 10.000</option>
<option>JASTEB BIASA - Rp 15.000</option>
<option>JASTEB VIP - Rp 10.000</option>
<option>JASTEB VIP - Rp 20.000</option>
<option>JASTEB VIP - Rp 30.000</option>
</select>

<input type="text" id="kontak" placeholder="Email / Nomor HP">
<input type="date" id="tanggal">

<select id="hari">
<option value="">Pilih Hari</option>
<option>Senin</option>
<option>Selasa</option>
<option>Rabu</option>
<option>Kamis</option>
<option>Jumat</option>
<option>Sabtu</option>
<option>Minggu</option>
</select>

<button onclick="order()">Beli Sekarang</button>
</div>

<div id="qris">
<h3>Scan QRIS</h3>
<img src="https://image2url.com/r2/default/images/1775056109222-c9c77b23-53b4-4097-90c3-bdf097d879a7.jpg">
</div>

</div>

<script>
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "block";
}, 3000);

setInterval(() => {
    document.getElementById("jam").innerText = new Date().toLocaleString("id-ID");
}, 1000);

function order() {
    let produk = document.getElementById("produk").value;
    let kontak = document.getElementById("kontak").value;
    let tanggal = document.getElementById("tanggal").value;
    let hari = document.getElementById("hari").value;

    if (!produk || !kontak || !tanggal || !hari) {
        alert("Isi semua data!");
        return;
    }

    document.getElementById("qris").style.display = "block";

    setTimeout(() => {
        let pesan = `Halo Admin,%0ASaya order:%0A${produk}%0A${kontak}%0A${tanggal}%0A${hari}`;
        window.location.href = "https://wa.me/6283172916537?text=" + pesan;
    }, 5000);
}
</script>

</body>
</html>
